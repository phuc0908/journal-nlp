name: CI/CD Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Root Dependencies
      run: npm install

    - name: Install Frontend Dependencies
      run: |
        cd react-web-app
        npm install

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: Build Frontend
      run: npm run build

    - name: Success Check
      run: echo '✅ Build completed successfully!'
